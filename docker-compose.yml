services:
  backend:
    build: ./backend
    container_name: workbench-backend
    restart: unless-stopped
    environment:
      # 可选：在服务端预置默认地址与 Key（前端请求中可省略对应字段）。
      # 留空则要求前端在网页里填写。
      IMAGE_BASE_URL: ${IMAGE_BASE_URL:-}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      SERVER_PORT: 8081
    expose:
      - "8081"
    # 如需直接调试后端，取消下面注释即可对外暴露 8080。
    # ports:
    #   - "8080:8080"

  frontend:
    build: ./frontend
    container_name: workbench-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # 仅在容器网络内暴露 80，由外部 nginx-proxy 反代并终结 HTTPS。
    # 不要绑定宿主机 80/443：会与 nginx-proxy 冲突（Bind failed: port already allocated）。
    expose:
      - "80"
