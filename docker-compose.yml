services:
  backend:
    build: ./backend
    container_name: workbench-backend
    restart: unless-stopped
    environment:
      # 可选：在服务端预置默认地址与 Key（前端请求中可省略对应字段）。
      # 留空则要求前端在网页里填写。
      IMAGE_BASE_URL: ${IMAGE_BASE_URL:-}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      SERVER_PORT: 8081
    expose:
      - "8081"
    # 如需直接调试后端，取消下面注释即可对外暴露 8080。
    # ports:
    #   - "8080:8080"

  frontend:
    build: ./frontend
    container_name: workbench-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
