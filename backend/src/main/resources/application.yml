server:
  port: 8080

spring:
  application:
    name: llm-workbench-backend
  mvc:
    async:
      request-timeout: 300000
  servlet:
    multipart:
      # 图生图参考图可能较大，放宽单文件与整请求上限。
      max-file-size: 25MB
      max-request-size: 120MB

# Optional server-side defaults. The frontend can override baseUrl / apiKey per request.
# You may also set them here (or via env vars) to avoid exposing the key to the browser.
workbench:
  image:
    default-base-url: ${IMAGE_BASE_URL:}
    default-api-key: ${IMAGE_API_KEY:}

logging:
  level:
    com.workbench: INFO
